<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
    .title { font-family: 'Playfair Display', Georgia, serif; font-size: 28px; font-weight: 700; fill: #f5f0e6; }
    .subtitle { font-family: 'Playfair Display', Georgia, serif; font-size: 11px; fill: #f5f0e6; letter-spacing: 3px; }
  </style>
  
  <!-- Title -->
  <text x="140" y="28" text-anchor="middle" class="title">Summer Long Hazel</text>
  
  <!-- Decorative hazel branch divider -->
  <g transform="translate(140, 48)">
    <!-- Left branch -->
    <path d="M0 0 L-70 0" stroke="#d4af37" stroke-width="1" fill="none"/>
    <!-- Left leaves -->
    <ellipse cx="-55" cy="-5" rx="10" ry="5" fill="none" stroke="#d4af37" stroke-width="1" transform="rotate(-25 -55 -5)"/>
    <ellipse cx="-40" cy="4" rx="8" ry="4" fill="none" stroke="#d4af37" stroke-width="1" transform="rotate(20 -40 4)"/>
    <ellipse cx="-65" cy="5" rx="7" ry="3.5" fill="none" stroke="#d4af37" stroke-width="1" transform="rotate(-15 -65 5)"/>
    
    <!-- Right branch -->
    <path d="M0 0 L70 0" stroke="#d4af37" stroke-width="1" fill="none"/>
    <!-- Right leaves -->
    <ellipse cx="55" cy="-5" rx="10" ry="5" fill="none" stroke="#d4af37" stroke-width="1" transform="rotate(25 55 -5)"/>
    <ellipse cx="40" cy="4" rx="8" ry="4" fill="none" stroke="#d4af37" stroke-width="1" transform="rotate(-20 40 4)"/>
    <ellipse cx="65" cy="5" rx="7" ry="3.5" fill="none" stroke="#d4af37" stroke-width="1" transform="rotate(15 65 5)"/>
    
    <!-- Center hazelnut -->
    <ellipse cx="0" cy="0" rx="6" ry="8" fill="#d4af37"/>
  </g>
  
  <!-- Subtitle -->
  <text x="140" y="72" text-anchor="middle" class="subtitle">CAROLINA GOLF CLUB • 2026</text>
</svg>