<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
    .title { font-family: 'Playfair Display', Georgia, serif; font-size: 42px; font-weight: 700; fill: #f5f0e6; }
    .subtitle { font-family: 'Playfair Display', Georgia, serif; font-size: 12px; fill: #f5f0e6; letter-spacing: 4px; }
  </style>
  
  <!-- Title -->
  <text x="250" y="38" text-anchor="middle" class="title">The Summer Long Hazel</text>
  
  <!-- Decorative hazel branch divider -->
  <g transform="translate(250, 58)">
    <!-- Left branch -->
    <path d="M0 0 L-100 0" stroke="#d4af37" stroke-width="1.5" fill="none"/>
    <!-- Left leaves -->
    <ellipse cx="-80" cy="-6" rx="12" ry="6" fill="none" stroke="#d4af37" stroke-width="1.2" transform="rotate(-25 -80 -6)"/>
    <ellipse cx="-55" cy="5" rx="10" ry="5" fill="none" stroke="#d4af37" stroke-width="1.2" transform="rotate(20 -55 5)"/>
    <ellipse cx="-95" cy="6" rx="9" ry="4" fill="none" stroke="#d4af37" stroke-width="1.2" transform="rotate(-15 -95 6)"/>
    
    <!-- Right branch -->
    <path d="M0 0 L100 0" stroke="#d4af37" stroke-width="1.5" fill="none"/>
    <!-- Right leaves -->
    <ellipse cx="80" cy="-6" rx="12" ry="6" fill="none" stroke="#d4af37" stroke-width="1.2" transform="rotate(25 80 -6)"/>
    <ellipse cx="55" cy="5" rx="10" ry="5" fill="none" stroke="#d4af37" stroke-width="1.2" transform="rotate(-20 55 5)"/>
    <ellipse cx="95" cy="6" rx="9" ry="4" fill="none" stroke="#d4af37" stroke-width="1.2" transform="rotate(15 95 6)"/>
    
    <!-- Center hazelnut -->
    <ellipse cx="0" cy="0" rx="8" ry="10" fill="#d4af37"/>
  </g>
  
  <!-- Subtitle -->
  <text x="250" y="88" text-anchor="middle" class="subtitle">CAROLINA GOLF CLUB • 2026</text>
</svg>